{% extends "auctions/layout.html" %}
{% load socialaccount %}

{% block content %}
    <div class="register-page_container">
        <div class="register-page_block">
            <h2 class="register-page_title">Register</h2>

            {% if message %}
                <div class="register-page_message">{{ message }}</div>
            {% endif %}

            <form class="register-login_form" action="{% url 'register' %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <input class="form-control" autofocus type="text" name="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <input class="form-control" type="email" name="email" placeholder="Email Address">
                </div>
                <div class="form-group">
                    <input class="form-control" type="password" name="password" placeholder="Password">
                </div>
                <div class="form-group">
                    <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
                </div>
                <input class="button-primary" type="submit" value="Register" style="width: 100%; padding: 12px; border-radius: 12px; font-weight: 600;">
            </form>

            <div style="text-align: center; margin: 18px 0; color: #64748b; font-size: 0.9rem; position: relative;">
                <span style="background: #ffffff; padding: 0 10px; position: relative; z-index: 1;">or</span>
                <div style="position: absolute; top: 50%; left: 0; right: 0; border-top: 1px solid #e2e8f0; z-index: 0;"></div>
            </div>

            <a href="{% provider_login_url 'google' %}" class="btn-google-auth" style="display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; background: #ffffff; color: #0f172a; font-weight: 600; text-decoration: none; transition: background 0.2s;">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.86 2.22c1.67-1.54 2.63-3.8 2.63-6.55z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.86-2.22c-.8.53-1.82.85-3.1.85-2.39 0-4.41-1.61-5.14-3.78H.95v2.3C2.43 15.89 5.5 18 9 18z" fill="#34A853"/>
                    <path d="M3.86 10.65c-.19-.57-.3-1.17-.3-1.8s.11-1.23.3-1.8V4.75H.95C.34 5.97 0 7.35 0 8.85s.34 2.88.95 4.1l2.91-2.3z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.4C13.46.97 11.42 0 9 0 5.5 0 2.43 2.11.95 5.05l2.91 2.3C4.59 5.2 6.61 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>
            <div class="register-page_login-register" style="margin-top: 20px;">Already have an account? <a href="{% url 'login' %}">Log In here.</a></div>
        </div>
    </div>
{% endblock %}
