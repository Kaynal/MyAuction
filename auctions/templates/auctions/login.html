{% extends "auctions/layout.html" %}

{% block content %}

    <div class="login-page_container">
        <div class="login-page_block">
            <h2 class="login-page_title">Login</h2>

            {% if message %}
                <div class="register-page_message">{{ message }}</div>
            {% endif %}

            <form class="register-login_form" action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <input autofocus class="form-control" type="text" name="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <input class="form-control" type="password" name="password" placeholder="Password">
                </div>
                <input class="btn btn-primary" type="submit" value="Login">
            </form>

            <div class="register-page_login-register">Don't have an account? <a href="{% url 'register' %}">Register here.</a></div>
        </div>
    </div>

{% endblock %}
